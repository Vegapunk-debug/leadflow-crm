<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <rect x="0" y="0" width="40" height="40" rx="9" fill="#047a55"/>
  <!-- Custom serif italic L, drawn as paths for pixel-perfect rendering at any size -->
  <!-- Italic stem (parallelogram) -->
  <polygon points="16.2,9 20.4,9 16.6,27.2 12.4,27.2" fill="#ffffff"/>
  <!-- Top serif cap -->
  <polygon points="13.6,9 22.6,9 22.2,11 14.0,11" fill="#ffffff"/>
  <!-- Bottom foot (with subtle right-end upturn for serif terminal) -->
  <polygon points="11,27.2 28.5,27.2 28.5,30 11,30" fill="#ffffff"/>
  <polygon points="27,24.8 29.5,24.8 28.7,27.4 27,27.4" fill="#ffffff"/>
</svg>
