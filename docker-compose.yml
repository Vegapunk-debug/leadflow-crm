services:
  server:
    build: ./server
    container_name: leadflow-server
    environment:
      MONGO_URI: ${MONGO_URI}
      PORT: 8001
    ports:
      - "8001:8001"

  client:
    build: ./client
    container_name: leadflow-client
    environment:
      VITE_API_URL: http://localhost:8001/api
    ports:
      - "3000:3000"
    depends_on:
      - server
